name: Gemini AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

# 같은 PR에 빠른 연속 push 시 이전 리뷰 취소
concurrency:
  group: ai-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR Diff
        id: get_diff
        run: |
          # 리뷰 불필요한 파일 제외 (lock파일, 이미지 등)
          git diff origin/${{ github.base_ref }} HEAD \
            -- . ':!yarn.lock' ':!package-lock.json' ':!pnpm-lock.yaml' \
            ':!*.svg' ':!*.png' ':!*.jpg' ':!*.ico' ':!*.webp' \
            > pr_diff.txt

          # 빈 diff 체크
          if [ ! -s pr_diff.txt ]; then
            echo "변경사항이 없습니다. 리뷰를 건너뜁니다."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "skip=false" >> $GITHUB_OUTPUT

      - name: Gemini AI Review
        if: steps.get_diff.outputs.skip != 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          # 1. Diff 내용 가져오기 (토큰 제한 방지를 위해 50,000자 제한)
          DIFF_CONTENT=$(cat pr_diff.txt | head -c 50000)

          # 2. 프롬프트 구성
          PROMPT=$(cat <<'PROMPT_END'
          당신은 유능한 시니어 프론트엔드 개발자입니다.
          이 프로젝트는 Next.js + TypeScript + Supabase 기반의 공동 가계부 앱입니다.

          아래의 코드 변경사항(diff)을 리뷰해주세요.

          ## 리뷰 기준
          1. **버그 가능성**: 런타임 에러, null/undefined 처리, 타입 안전성
          2. **성능**: 불필요한 리렌더링, N+1 쿼리, 중복 API 호출
          3. **보안**: XSS, SQL 인젝션, RLS 우회 가능성, API 키 노출
          4. **가독성**: 네이밍, 코드 구조, 중복 코드

          ## 응답 형식
          - 심각도를 🔴(심각), 🟡(주의), 🟢(제안)으로 표시
          - 각 이슈에 구체적인 파일명과 라인 번호를 명시
          - 수정 제안이 있다면 코드 예시 포함
          - 이슈가 없다면 "변경사항에 특별한 문제가 없습니다 ✅" 라고 답변
          PROMPT_END
          )

          FULL_PROMPT="${PROMPT}

          ## PR 정보
          - 제목: ${PR_TITLE}
          - 설명: ${PR_BODY:-설명 없음}

          ## 코드 변경사항 (diff)
          ${DIFF_CONTENT}"

          # 3. JSON 페이로드 생성
          jq -n --arg prompt "$FULL_PROMPT" \
            '{contents: [{parts: [{text: $prompt}]}]}' > payload.json

          # 4. Gemini API 호출 (재시도 로직 포함)
          MAX_RETRIES=3
          RETRY_COUNT=0
          SUCCESS=false

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            echo "Gemini API 호출 시도 ($((RETRY_COUNT + 1))/$MAX_RETRIES)..."
            
            HTTP_STATUS=$(curl -s -w "%{http_code}" -X POST \
              "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent" \
              -H "Content-Type: application/json" \
              -H "x-goog-api-key: ${GEMINI_API_KEY}" \
              -d @payload.json \
              -o response.json)

            if [ "$HTTP_STATUS" -eq 200 ]; then
              if jq -e '.candidates[0].content.parts[0].text' response.json > /dev/null 2>&1; then
                SUCCESS=true
                break
              fi
            fi

            echo "API 호출 실패 (HTTP $HTTP_STATUS). 5초 후 재시도합니다..."
            cat response.json
            RETRY_COUNT=$((RETRY_COUNT + 1))
            sleep 5
          done

          if [ "$SUCCESS" = false ]; then
            echo "::error::Gemini API 호출 최종 실패"
            exit 1
          fi

          jq -r '.candidates[0].content.parts[0].text' response.json > review_comment.md

      - name: Post Comment
        if: steps.get_diff.outputs.skip != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 이전 AI 리뷰 댓글 삭제
          PREVIOUS_COMMENTS=$(gh api \
            repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
            --jq '.[] | select(.body | startswith("## 🤖 Gemini AI Code Review")) | .id')

          for comment_id in $PREVIOUS_COMMENTS; do
            gh api -X DELETE repos/${{ github.repository }}/issues/comments/$comment_id
          done

          # 리뷰 댓글 작성
          if [ -s review_comment.md ]; then
            {
              echo "## 🤖 Gemini AI Code Review"
              echo ""
              echo "> 이 리뷰는 AI에 의해 자동 생성되었습니다. 참고용으로만 활용해주세요."
              echo ""
              cat review_comment.md
              echo ""
              echo "---"
              echo "_Powered by Gemini 1.5 Flash | 새 커밋을 push하면 자동으로 재리뷰됩니다._"
            } > final_comment.md

            gh pr comment ${{ github.event.pull_request.number }} --body-file final_comment.md
          else
            echo "::warning::리뷰 내용을 생성하지 못했습니다."
          fi