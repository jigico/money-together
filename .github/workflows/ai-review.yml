name: Gemini AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # base branch를 명시적으로 fetch
      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }}

      - name: Get PR Diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > pr_diff.txt
          # 토큰 초과 방지: 최대 30000자로 제한
          head -c 30000 pr_diff.txt > pr_diff_trimmed.txt
          mv pr_diff_trimmed.txt pr_diff.txt

      # Gemini 호출 → output 캡처
      - name: Gemini AI Review
        id: gemini
        uses: google-gemini/gemini-github-action@v1
        with:
          api-key: ${{ secrets.GEMINI_API_KEY }}
          model: 'gemini-2.0-flash'
          system-instruction: |
            # Role
            React + TypeScript 프로젝트의 시니어 코드 리뷰어.
            전달받은 git diff를 분석하여 실질적이고 액션 가능한 피드백만 제공한다.

            # Review Criteria (우선순위 순)

            ## 1. 버그 및 런타임 에러
            - null/undefined 접근 가능성 (optional chaining 누락 등)
            - 잘못된 조건문, off-by-one, 비동기 race condition
            - useEffect 의존성 배열 누락 또는 과잉
            - 이벤트 핸들러/구독의 cleanup 누락

            ## 2. 보안
            - 하드코딩된 시크릿, API 키, 토큰
            - XSS 취약점 (dangerouslySetInnerHTML, 미검증 사용자 입력 렌더링)
            - 민감 정보의 console.log 노출

            ## 3. 성능
            - 불필요한 리렌더링 유발 (인라인 객체/배열/함수를 prop으로 전달)
            - useMemo/useCallback이 필요한 고비용 연산 또는 참조 안정성 문제
            - 반복문 내 API 호출, N+1 패턴
            - 번들 크기에 영향을 주는 불필요한 import

            ## 4. 설계 및 유지보수성
            - 하나의 컴포넌트/함수가 너무 많은 책임을 지는 경우
            - 매직 넘버, 하드코딩된 문자열 (상수 추출 필요)
            - 중복 로직 (기존 유틸/훅으로 대체 가능한 코드)
            - 네이밍이 의도를 드러내지 못하는 경우

            ## 5. TypeScript
            - any 타입 사용
            - 타입 단언(as) 남용 — 타입 가드나 제네릭으로 대체 가능한 경우
            - 함수 반환 타입이 명시적이어야 하는데 누락된 경우

            # Output Format
            아래 형식을 반드시 지켜서 응답한다:

            ### 🚨 Critical (즉시 수정 필요)
            해당 사항이 있을 때만 작성. 버그, 보안 이슈.
            - **파일명:라인** — 문제 설명 → 수정 제안 (코드 블록)

            ### ⚠️ Warning (수정 권장)
            성능, 설계 문제.
            - **파일명:라인** — 문제 설명 → 수정 제안

            ### 💡 Suggestion (개선하면 좋음)
            가독성, 컨벤션, 사소한 개선.
            - **파일명:라인** — 제안 내용

            ### ✅ Good
            잘 작성된 부분 1~2가지를 짧게 언급하여 긍정 피드백도 제공한다.

            # Rules
            - 한국어로 작성한다.
            - 해당 사항이 없는 섹션은 생략한다.
            - 단순 스타일(세미콜론, 따옴표 등)은 린터/포매터 영역이므로 지적하지 않는다.
            - 추측이 아닌, diff에서 확인 가능한 문제만 지적한다.
            - 수정 제안 시 반드시 구체적인 코드 예시를 포함한다.
            - 총 피드백은 10개 이내로 제한하여 핵심에 집중한다.
          file-path: ./pr_diff.txt

      # 캡처한 output을 PR 댓글로 작성
      - name: Post Review Comment
        uses: actions/github-script@v7
        with:
          script: |
            const review = `${{ steps.gemini.outputs.output }}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `## 🤖 Gemini AI Code Review\n\n${review}`
            });

