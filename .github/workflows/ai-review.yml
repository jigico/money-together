name: Gemini AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR Diff
        id: get_diff
        run: |
          # main 브랜치와 현재 PR 브랜치 사이의 차이점 추출
          git diff origin/${{ github.base_ref }} HEAD > pr_diff.txt

      - name: Gemini AI Review
        uses: google-gemini/gemini-github-action@v1
        with:
          api-key: ${{ secrets.GEMINI_API_KEY }}
          model: 'gemini-2.5-flash'
          system-instruction: |
            당신은 유능한 시니어 프론트엔드 개발자입니다. 
            React, Next.js, TypeScript, Supabase를 사용하는 프로젝트의 코드 리뷰를 담당합니다.
            전달받은 git diff 내용을 바탕으로 다음 사항을 중점적으로 리뷰하세요:
            1. 성능 최적화: N+1 쿼리, 중복 API 호출, 불필요한 리렌더링 여부
            2. 타입 안정성: TypeScript 타입 정의가 적절한지 확인
            3. 가독성: 변수명, 함수 구조 등 유지보수가 용이한지 확인
            4. 보안: API 키나 비밀번호가 코드에 노출되지 않았는지 확인
            리뷰 의견은 한국어로 작성하며, 구체적인 코드 수정 제안이 있다면 포함해주세요.
          file-path: ./pr_diff.txt