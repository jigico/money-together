name: Gemini AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: ai-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR Diff
        id: get_diff
        run: |
          git diff origin/${{ github.base_ref }} HEAD \
            -- . ':!yarn.lock' ':!package-lock.json' ':!pnpm-lock.yaml' \
            ':!*.svg' ':!*.png' ':!*.jpg' ':!*.ico' ':!*.webp' \
            > pr_diff.txt

          if [ ! -s pr_diff.txt ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Gemini AI Review
        if: steps.get_diff.outputs.skip != 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          DIFF_CONTENT=$(cat pr_diff.txt | head -c 40000)

          PROMPT=$(cat <<'PROMPT_END'
          당신은 유능한 시니어 프론트엔드 개발자입니다.
          이 프로젝트는 Next.js + TypeScript + Supabase 기반의 공동 가계부 앱입니다.
          아래 코드 변경사항(diff)을 리뷰하고, 버그 가능성, 성능(N+1 쿼리 등), 가독성을 중심으로 피드백을 주세요.
          이슈가 없다면 "변경사항에 특별한 문제가 없습니다 ✅"라고 답해주세요.
          PROMPT_END
          )

          FULL_PROMPT="${PROMPT}\n\n## PR 정보\n- 제목: ${PR_TITLE}\n- 설명: ${PR_BODY:-설명 없음}\n\n## Diff\n${DIFF_CONTENT}"

          jq -n --arg prompt "$FULL_PROMPT" '{contents: [{parts: [{text: $prompt}]}]}' > payload.json

          # API 호출 (재시도 로직 포함 및 모델명 2.0-flash로 변경)
          for i in {1..2}; do
            HTTP_STATUS=$(curl -s -w "%{http_code}" -X POST \
              "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent" \
              -H "Content-Type: application/json" \
              -H "x-goog-api-key: ${GEMINI_API_KEY}" \
              -d @payload.json \
              -o response.json)

            if [ "$HTTP_STATUS" -eq 200 ]; then
              break
            elif [ "$HTTP_STATUS" -eq 429 ]; then
              echo "Rate limit hit, waiting 20s..."
              sleep 20
            else
              echo "Error: HTTP $HTTP_STATUS"
              cat response.json
              exit 1
            fi
          done

          jq -r '.candidates[0].content.parts[0].text' response.json > review_comment.md

      - name: Post Comment
        if: steps.get_diff.outputs.skip != 'true' && success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 기존 댓글 삭제
          COMMENTS=$(gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments --jq '.[] | select(.body | startswith("## 🤖 Gemini AI Code Review")) | .id')
          for id in $COMMENTS; do
            gh api -X DELETE repos/${{ github.repository }}/issues/comments/$id
          done

          # 새 댓글 작성
          if [ -s review_comment.md ]; then
            {
              echo "## 🤖 Gemini AI Code Review"
              echo ""
              echo "> 이 리뷰는 AI에 의해 자동 생성되었습니다."
              echo ""
              cat review_comment.md
              echo ""
              echo "---"
              echo "_Powered by Gemini 2.0 Flash_"
            } > final_comment.md
            gh pr comment ${{ github.event.pull_request.number }} --body-file final_comment.md
          fi